name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npx vite build

      - name: CLI smoke test
        run: node bin/cli.js help > /dev/null

      - name: Package validation
        run: npm pack --dry-run 2>&1 | tail -20

      - name: Run tests
        run: npm run test

      - name: Security audit
        run: npm audit --audit-level=critical
